name: Create Exe

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Create BIG JAR
        run: mvn clean package shade:shade

      - name: JPackage Exe
        run: jpackage --input target/ --dest apps/ --name "ODMERUN" --main-jar SESEditor-1.0-SNAPSHOT-shaded.jar --main-class odme.odmeeditor.Main --type exe --win-per-user-install --win-shortcut

      - uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: apps/
